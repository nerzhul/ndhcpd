# DHCP Server Configuration

# Network interfaces the DHCP server should listen on
listen_interfaces:
  - eth0

# Database configuration
database_path: /var/lib/ndhcpd/dhcp.db

# API Server configuration
api:
  listen_address: 127.0.0.1
  port: 8080
  # Unix socket for local communication (optional, no authentication required)
  unix_socket: /var/run/ndhcpd.sock
  # Require token authentication for TCP API (default: false)
  # Note: Unix socket connections are always exempt from authentication
  require_authentication: false

# DHCP Server configuration
dhcp:
  # Default lease time in seconds (24 hours)
  default_lease_time: 86400
  
  # Maximum lease time in seconds (7 days)
  max_lease_time: 604800

# Router Advertisement (IPv6) configuration
# This section is optional - if not present, default values will be used
ra:
  # Default preferred lifetime in seconds (24 hours)
  default_preferred_lifetime: 86400
  
  # Default valid lifetime in seconds (30 days)
  default_valid_lifetime: 2592000
  
  # Default DNS lifetime in seconds for RDNSS option (24 hours)
  default_dns_lifetime: 86400
